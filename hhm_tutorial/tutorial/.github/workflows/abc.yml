name: Terraform and Ansible Deploy

on:
  push:
    branches:
      - main

jobs:
  packer_ami_template:
    if: false
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Packer
        uses: hashicorp/setup-packer@v3

      - name: Initialize Packer
        working-directory: packer_ami
        run: packer init .

      - name: Validate Packer template
        working-directory: packer_ami
        run: packer validate .

      - name: Build AMI
        working-directory: packer_ami
        run: packer build backend.pkr.hcl

      - name: Build AMI
        working-directory: packer_ami
        run: packer build frontend.pkr.hcl

  terraform_infrastructure:
    #needs: packer_ami_template
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      role_arn: ${{ steps.tf.outputs.role_arn }}
      pgres_db_name: ${{ steps.dbname.outputs.db_name }}
      pgres_db_endpoint: ${{ steps.dbendpoint.outputs.db_endpoint }}
      pgres_db_port: ${{ steps.dbport.outputs.db_port }}
      pgres_db_username: ${{ steps.dbusername.outputs.db_username }}
      pgres_db_password: ${{ steps.dbpassword.outputs.db_password }}
      BK_END_TG_ARN: ${{ steps.betgarn.outputs.backend_tg_arn }}
      FR_END_TG_ARN: ${{ steps.fetgarn.outputs.frontend_tg_arn }}

    steps:
      # -------------------------------------
      # Checkout repo
      # -----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Setup Terraform
      # ----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # -------------------------------
      # Terraform Init
      # -------------------------------
      - name: Terraform Init
        working-directory: terraform
        run: terraform init 


      # --------------------------------
      # Terraform Apply
      # ---------------------------------
      - name: Terraform Apply
        working-directory: terraform
        run: 
          terraform destroy --auto-approve -var-file=values.tfvars

      - name: Terraform Output for Ansible Variables
        working-directory: terraform
        run: 
          terraform output -json > ../ansible/tf_output.json

      - name: cat ../ansible/tf_output.json
        working-directory: terraform
        run: 
          terraform output -json > ../ansible/tf_output.json
         
      - name: Get Role ARN Output
        working-directory: terraform
        id: tf
        run: 
          echo "role_arn=$(terraform output -raw github_actions_role)" >> $GITHUB_OUTPUT

      - name: Get Terraform Output Frontend Target Group Arn
        working-directory: terraform
        id: fetgarn
        run: echo "frontend_tg_arn=$(terraform output -raw frontend_tg_arn)" >> $GITHUB_OUTPUT

      - name: Get Terraform Output Backend Target Group Arn
        working-directory: terraform
        id: betgarn
        run: echo "backend_tg_arn=$(terraform output -raw backend_tg_arn)" >> $GITHUB_OUTPUT



 #     - name: Get Terraform Frontend Public IP
 #       working-directory: terraform
 #       id: tfftpubip
 #       run: 
 #         echo "frontend_pub_ip=$(terraform output -raw frontend_public_ip)" >> $GITHUB_OUTPUT

 #     - name: Get Terraform Frontend Private IP
 #       working-directory: terraform
 #       id: tfftpriip
 #      run: 
 #         echo "frontend_pri_ip=$(terraform output -raw frontend_private_ip)" >> $GITHUB_OUTPUT
         
 #     - name: Get Terraform Backend Private IP
 #       working-directory: terraform
 #       id: tfbkprip
 #       run: 
 #         echo "backend_pri_ip=$(terraform output -raw backend_private_ip)" >> $GITHUB_OUTPUT
  
 #     - name: Get Terraform Backend Instance ID
 #       working-directory: terraform
 #       id: tfbkinstid
 #       run: 
 #        echo "backend_inst_id=$(terraform output -raw backend_instance_id)" >> $GITHUB_OUTPUT
  
 #     - name: Get Terraform Frontend Instance ID
 #       working-directory: terraform
 #       id: tfftinstid
 #       run: 
 #        echo "frontend_inst_id=$(terraform output -raw frontend_instance_id)" >> $GITHUB_OUTPUT

      - name: Get DB Endpoint Output
        working-directory: terraform
        id: dbendpoint
        run: 
          echo "db_endpoint=$(terraform output -raw db_endpoint)" >> $GITHUB_OUTPUT

      - name: Get DB Port Output
        working-directory: terraform
        id: dbport
        run: 
          echo "db_port=$(terraform output -raw db_port)" >> $GITHUB_OUTPUT

      - name: Get DB Name Output
        working-directory: terraform
        id: dbname
        run: 
          echo "db_name=$(terraform output -raw db_name)" >> $GITHUB_OUTPUT

      - name: Get DB Username Output
        working-directory: terraform
        id: dbusername
        run: 
          echo "db_username=$(terraform output -raw db_username)" >> $GITHUB_OUTPUT

      - name: Get DB Password Output
        working-directory: terraform
        id: dbpassword
        run: 
          echo "db_password=$(terraform output -raw db_password)" >> $GITHUB_OUTPUT

#checks for vulnerability in current code
  vulnerability_dependency_scan:
    needs: terraform_infrastructure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

#checks for leaks in secrets.
  secrets_scan:
    needs: vulnerability_dependency_scan
    runs-on: ubuntu-latest
    

    steps:
      - uses: actions/checkout@v3

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --report-format sarif --report-path gitleaks.sarif

      #- name: Upload SARIF
       # uses: github/codeql-action/upload-sarif@v3
       # with:
       #   sarif_file: gitleaks.sarif
 
  ansible_configuration:
    runs-on: ubuntu-latest
    needs: [terraform_infrastructure, vulnerability_dependency_scan, secrets_scan]
    permissions:
      id-token: write
      contents: read

    steps:
      # ----------------------------------
      # Checkout repo
      # ----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
      # ----------------------------
      # Install Python 
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and dependencies
        run: |
            python -m pip install --upgrade pip

      - name: Install Ansible and dependencies2
        run: |
            pip install ansible boto3 botocore 

      - name: Install amazon.aws collection
        run: |
            ansible-galaxy collection install amazon.aws community.aws

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         role-to-assume: ${{ needs.terraform_infrastructure.outputs.role_arn }}
         aws-region: us-east-1

         

      - name: echo FR_END_TG_ARN=$FR_END_TG_ARN
        env:
          BK_END_TG_ARN: ${{ needs.terraform_infrastructure.outputs.BK_END_TG_ARN }}
        run: |
          echo "BK_END_TG_ARN=$BK_END_TG_ARN"

      - name: Discover Instances Behind Frontend Target Group
        run: |
          aws elbv2 describe-target-health --target-group-arn ${{ needs.terraform_infrastructure.outputs.FR_END_TG_ARN }} --query 'TargetHealthDescriptions[].Target.Id' --output text > frontend_instance_ids.txt

      - name: Discover Instances Behind Backend Target Group
        run: |
          aws elbv2 describe-target-health --target-group-arn ${{ needs.terraform_infrastructure.outputs.BK_END_TG_ARN }} --query 'TargetHealthDescriptions[].Target.Id' --output text > backend_instance_ids.txt

      - name: Use Instance Id to get frontend private ip
        run: |
          aws ec2 describe-instances --instance-ids $(cat frontend_instance_ids.txt) --query 'Reservations[].Instances[].PrivateIpAddress' --output text > frontend_private_ips.txt

      - name: Use Instance Id to get backend private ip
        run: |
          aws ec2 describe-instances --instance-ids $(cat backend_instance_ids.txt) --query 'Reservations[].Instances[].PrivateIpAddress' --output text > backend_private_ips.txt

      - name: Use Instance Id to get backend public ip
        run: |
          aws ec2 describe-instances --instance-ids $(cat backend_instance_ids.txt) --query 'Reservations[].Instances[].PublicIpAddress' --output text > backend_public_ips.txt

      - name: Use Instance Id to get frontend public ip
        run: |
          aws ec2 describe-instances --instance-ids $(cat frontend_instance_ids.txt) --query 'Reservations[].Instances[].PublicIpAddress' --output text > frontend_public_ips.txt

      - name: Debug each IP
        run: |
          while read ip; do
            echo "Found IP: $ip"
          done < backend_instance_ids.txt



      - name: Generate Ansible Inventory
        run: |
          echo "all:" > ansible/inventory/asg-alb.yml
          echo "  children:" >> ansible/inventory/asg-alb.yml
          echo "    app:" >> ansible/inventory/asg-alb.yml
          echo "      hosts:" >> ansible/inventory/asg-alb.yml

          while read ip; do
            echo "        $ip:" >> ansible/inventory/asg-alb.yml
            echo "          ansible_user: ubuntu" >> ansible/inventory/asg-alb.yml
            echo "          ansible_connection: amazon.aws.aws_ssm" >> ansible/inventory/asg-alb.yml
          done < backend_instance_ids.txt


      - name: Popoluate Ansible Inventory
        working-directory: ansible
        run: |
          cat <<EOF > inventory/testrunhost.yml
          all:
            vars:
              ansible_become: true
              ansible_become_method: sudo
              ansible_become_user: root
              database_password: "osedudu"
            children:
              backend:
                hosts:
                  ${{ needs.terraform_infrastructure.outputs.backend_inst_id }}:
                    ansible_connection: amazon.aws.aws_ssm
                    ansible_user: ubuntu
                    ansible_aws_ssm_region: us-east-1
                    ansible_aws_ssm_bucket_name: techbleat744
                    ansible_region: us-east-1
                    ansible_remote_tmp: /tmp/.ansible/tmp

              frontend:
                hosts:
                  ${{ needs.terraform_infrastructure.outputs.frontend_inst_id }}:
                    ansible_connection: amazon.aws.aws_ssm
                    ansible_user: ubuntu
                    ansible_aws_ssm_region: us-east-1
                    ansible_aws_ssm_bucket_name: techbleat744
                    ansible_region: us-east-1
                    ansible_remote_tmp: /tmp/.ansible/tmp
          EOF
                   
      - name: Run Ansible Playbook
        run: |
            ansible-playbook -i ansible/inventory/testrunhost.yml \
            ansible/playbook.yml --extra-vars \
            "backend_private_ip=${{ needs.terraform_infrastructure.outputs.backend_pri_ip }} \
            frontend_public_ip=${{ needs.terraform_infrastructure.outputs.frontend_pub_ip }} \
            frontend_private_ip=${{ needs.terraform_infrastructure.outputs.frontend_pri_ip }} \
            db_name=${{ needs.terraform_infrastructure.outputs.pgres_db_name }} \
            db_endpoint=${{ needs.terraform_infrastructure.outputs.pgres_db_endpoint }} \
            db_port=${{ needs.terraform_infrastructure.outputs.pgres_db_port }} \
            db_username=${{ needs.terraform_infrastructure.outputs.pgres_db_username }} \
            db_password=${{ needs.terraform_infrastructure.outputs.pgres_db_password }}" -vvvvv